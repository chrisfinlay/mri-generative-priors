name: CI

on:
  push:
    branches: [main, solutions]
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.67.0
          cache: true

      - name: Lint
        run: pixi run lint

      - name: Run tests
        run: pixi run test

      # Always compute the milestone count, even if the full suite is red, so
      # the badge reflects real progress (including partial attempts).
      - name: Compute milestone progress
        if: always()
        run: pixi run milestones

      # Publish a PER-BRANCH badge JSON to the orphan `badges` branch, so each
      # branch's README shows its own progress (main -> main.json 0/8,
      # solutions -> solutions.json 8/8). The `badges` branch holds only these
      # generated artifacts; it intentionally does not track main.
      - name: Publish milestone badge
        if: always() && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/solutions')
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          mv milestones.json "/tmp/${BRANCH}.json"
          rm -f milestone.xml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash -u >/dev/null 2>&1 || true
          # Push with retry: main and solutions can publish concurrently.
          for attempt in 1 2 3 4 5; do
            if git ls-remote --exit-code --heads origin badges >/dev/null 2>&1; then
              git fetch origin badges
              git checkout -B badges origin/badges
            else
              git checkout --orphan badges
              git rm -rf . >/dev/null 2>&1 || true
            fi
            cp "/tmp/${BRANCH}.json" "${BRANCH}.json"
            git add "${BRANCH}.json"
            git diff --cached --quiet && break
            git commit -m "Update ${BRANCH} milestone badge [skip ci]"
            git push origin badges && break
            echo "push race, retrying ($attempt)..."
            sleep $((RANDOM % 5 + 1))
          done
